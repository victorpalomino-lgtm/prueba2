version: '3.8'

services:
  db:
    image: postgres:15
    container_name: try1pc_postgres
    environment:
      POSTGRES_DB: try1pc_db
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: